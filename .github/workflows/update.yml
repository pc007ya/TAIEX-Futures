name: Daily Stock Data Update

on:
  schedule:
    # 國際標準時間 (UTC) 週一至週五 07:30，相當於台北時間 (UTC+8) 15:30 (台股收盤後)
    - cron: '30 7 * * 1-5'
  workflow_dispatch: # 保留按鈕，讓你可以隨時手動點擊更新

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
    - name: 複製專案程式碼
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝爬蟲必要套件
      run: |
        pip install yfinance pandas

    - name: 執行資料更新爬蟲
      run: python update_data.py

    - name: 將最新數據提交並同步到 GitHub
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add data.json
        git diff-index --quiet HEAD || (git commit -m "🤖 自動更新：每日收盤數據" && git push)

        - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add data.json
        # 檢查是否有檔案變動，如果有才提交
        if ! git diff-index --quiet HEAD; then
          git commit -m "🤖 自動更新：每日收盤數據"
          # 關鍵修正：先拉取遠端最新進度進行合併，避免衝突
          git pull --rebase origin main
          # 推送回遠端
          git push origin main
        else
          echo "數據無變動，無需更新。"
        fi
